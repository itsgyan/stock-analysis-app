# ======================================================
# Stock Analysis - Spring Boot Application Configuration
# ======================================================

# --- Server ---
server.port=8080
server.servlet.context-path=/api

# --- Application Name ---
spring.application.name=stock-analysis

# --- PostgreSQL Database ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stockanalysis}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# --- JPA / Hibernate ---

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- H2 Console (Disabled) ---
spring.h2.console.enabled=false

# --- Logging ---
logging.level.com.project.stockanalysis=DEBUG
logging.level.org.springframework.web=INFO

# --- JWT Configuration ---
# Base64-encoded 256-bit secret key (change this in production!)
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjcmV0LWtleS1mb3Itc3RvY2stYW5hbHlzaXMtYXBwLTIwMjQ=}
# Token expiry: 24 hours in milliseconds
app.jwt.expiration-ms=86400000

# -------------------------------------------------------
# Alpha Vantage API Configuration
# Get your FREE key at: https://www.alphavantage.co/support/#api-key
# -------------------------------------------------------
alphavantage.api.key=${ALPHAVANTAGE_API_KEY:demo}
alphavantage.api.base-url=https://www.alphavantage.co/query
# Free tier: 25 requests/day, 5/min. Set to 'demo' for testing (limited symbols)
# Supported demo symbols: IBM, MSFT, AAPL (for some endpoints)

# --- HTTP Client Config ---
spring.mvc.async.request-timeout=30000
alphavantage.connect-timeout-ms=5000
alphavantage.read-timeout-ms=15000

# --- WebSocket ---
spring.websocket.max-session-idle-timeout=600000

# --- CORS (allow frontend during development) ---
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8080,http://localhost:3000}
